{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
    <div class="card p-4 shadow">
        <h3>New Book</h3>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-success mt-3">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
