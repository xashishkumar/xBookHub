{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4 text-center">xCollection</h1>

    <div class="row">
        {% for book in books %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ book.title }}</h5>
                        <p class="card-text text-muted mb-3">By: {{ book.author }}</p>
                        
                        <div class="d-flex gap-2">
                            <a href="{% url 'book_detail' book.id %}" class="btn btn-primary btn-sm">
                                View
                            </a>

                            <a href="{% url 'book_update' book.id %}" class="btn btn-warning btn-sm">
                                Edit
                            </a>

                            <a href="{% url 'book_delete' book.id %}" class="btn btn-danger btn-sm">
                                Delete
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12">
                <p class="alert alert-info">No books available in the xCollections.</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
